<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Knowledge Graph</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0f;color:#d8d0ea;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden;height:100vh}
    #graph-container{position:fixed;inset:0;width:100vw;height:100vh}
    #info{position:fixed;top:20px;left:20px;z-index:10;pointer-events:none}
    #info h1{font-size:20px;font-weight:700;color:#f1ecff;text-shadow:0 0 20px rgba(100,80,200,.55)}
    #info p{font-size:13px;color:#a99cc8;margin-top:5px}
    #tooltip{position:fixed;z-index:30;background:rgba(15,15,30,.94);border:1px solid rgba(120,100,220,.45);border-radius:8px;padding:10px 14px;font-size:13px;max-width:320px;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 4px 20px rgba(0,0,0,.6)}
    #tooltip.visible{opacity:1}
    #tooltip .tt-title{color:#f1ecff;font-weight:650;margin-bottom:4px}
    #tooltip .tt-type{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;background:rgba(120,100,220,.22);color:#c6b8f0;margin-bottom:5px}
    #tooltip .tt-community{font-size:12px;color:#a496c2}
    #controls{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:10px;align-items:center}
    #controls button,#controls a{background:#161225;border:1px solid rgba(150,130,255,.45);color:#eee9ff;padding:9px 16px;border-radius:8px;font-size:14px;line-height:1;cursor:pointer;transition:all .2s;text-decoration:none;box-shadow:0 8px 24px rgba(0,0,0,.38)}
    #controls button:hover,#controls a:hover{background:#241b3e;border-color:rgba(190,170,255,.7)}
    #search-box{background:#100d1b;border:1px solid rgba(150,130,255,.45);color:#eee9ff;padding:9px 13px;border-radius:8px;font-size:14px;width:240px;outline:none;box-shadow:0 8px 24px rgba(0,0,0,.38)}
    #search-box:focus{border-color:rgba(205,188,255,.75)}
    #search-box::placeholder{color:#7f739d}
    #legend{position:fixed;right:16px;top:20px;bottom:20px;width:320px;z-index:15;display:flex;flex-direction:column;gap:5px;background:rgba(10,10,18,.88);border:1px solid rgba(120,100,220,.3);border-radius:12px;padding:12px;overflow:auto;box-shadow:0 16px 42px rgba(0,0,0,.46)}
    .legend-title{position:sticky;top:-12px;background:#0b0a12;color:#f1ecff;font-size:15px;font-weight:700;padding:2px 0 10px;margin-bottom:2px;border-bottom:1px solid rgba(120,100,220,.22)}
    .legend-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;font-size:14px;color:#ded7f0;background:rgba(255,255,255,.025);border:1px solid transparent;min-height:34px}
    .legend-item:hover{background:rgba(100,80,200,.18);border-color:rgba(140,120,240,.25)}
    .legend-item.active{background:rgba(100,80,200,.28);border-color:rgba(165,145,255,.52);color:#fff}
    .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 10px currentColor}
    .legend-item span:last-child{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    #loading{position:fixed;inset:0;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:#0a0a0f;color:#c0b8d0;transition:opacity .5s}
    #loading.hidden{opacity:0;pointer-events:none}
    .loader{width:32px;height:32px;border:2px solid rgba(100,80,200,.2);border-top-color:#8870d0;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media (max-width:900px){#legend{width:260px;right:10px}.legend-item{font-size:12px}#controls{left:12px;right:282px;transform:none;justify-content:flex-start;flex-wrap:wrap}#search-box{width:180px}}
  </style>
</head>
<body>
  <div id="loading"><div class="loader"></div><div>Loading knowledge graph...</div></div>
  <div id="info"><h1>🧠 3D Knowledge Graph</h1><p>知识单元 · 概念节点 · 关系网络</p></div>
  <div id="legend"></div>
  <div id="tooltip"><div class="tt-title"></div><div><span class="tt-type"></span></div><div class="tt-community"></div></div>
  <div id="controls">
    <button id="btn-auto">自动旋转</button>
    <a href="index.html">← 返回首页</a>
    <input id="search-box" type="text" placeholder="搜索节点...">
  </div>
  <div id="graph-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.70.0/dist/3d-force-graph.min.js"></script>
  <script src="graph.js"></script>
</body>
</html>
