<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D知识图谱</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0f;color:#c0b8d0;font-family:'Inter','Segoe UI','Noto Sans SC',sans-serif;overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased}
    #graph-container{width:100vw;height:100vh;position:fixed;top:0;left:0}
    #info{position:fixed;top:20px;left:20px;z-index:10;pointer-events:none}
    #info h1{font-size:18px;font-weight:600;color:#e0d8f0;text-shadow:0 0 20px rgba(100,80,200,.5)}
    #info p{font-size:12px;color:#8880a0;margin-top:4px}
    #tooltip{position:fixed;z-index:20;background:rgba(15,15,30,.92);border:1px solid rgba(120,100,220,.4);border-radius:8px;padding:10px 14px;font-size:13px;max-width:300px;pointer-events:none;opacity:0;transition:opacity .15s;backdrop-filter:blur(8px);box-shadow:0 4px 20px rgba(0,0,0,.6)}
    #tooltip.visible{opacity:1}
    #tooltip .tt-title{color:#e0d8f0;font-weight:600;margin-bottom:4px}
    #tooltip .tt-type{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(120,100,220,.2);color:#a090d0;margin-bottom:4px}
    #tooltip .tt-community{font-size:11px;color:#8070a0}
    #controls{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:10px;align-items:center;padding:10px;background:linear-gradient(180deg,rgba(24,22,44,.82),rgba(12,12,24,.72));border:1px solid rgba(150,130,255,.22);border-radius:16px;backdrop-filter:blur(14px);box-shadow:0 14px 46px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.07)}
    #controls button,#controls a{height:38px;background:linear-gradient(180deg,rgba(78,64,142,.42),rgba(38,32,72,.72));border:1px solid rgba(170,150,255,.32);color:#e7ddff;padding:0 18px;border-radius:11px;font-size:13px;font-weight:600;letter-spacing:.02em;cursor:pointer;backdrop-filter:blur(6px);transition:transform .16s,background .16s,border-color .16s,box-shadow .16s,color .16s;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
    #controls button:hover,#controls a:hover{background:linear-gradient(180deg,rgba(104,86,186,.62),rgba(54,45,104,.86));border-color:rgba(205,190,255,.58);color:#fff;transform:translateY(-1px);box-shadow:0 8px 24px rgba(87,67,180,.28),inset 0 1px 0 rgba(255,255,255,.12)}
    #controls button:active,#controls a:active{transform:translateY(0);box-shadow:inset 0 2px 10px rgba(0,0,0,.22)}
    #search-box{height:38px;background:rgba(8,8,18,.76);border:1px solid rgba(170,150,255,.28);color:#efeaff;padding:0 14px;border-radius:11px;font-size:13px;width:220px;outline:none;backdrop-filter:blur(6px);transition:border-color .16s,box-shadow .16s,background .16s}
    #search-box:focus{border-color:rgba(214,202,255,.72);background:rgba(15,14,30,.92);box-shadow:0 0 0 3px rgba(130,100,240,.18)}
    #search-box::placeholder{color:#887ca5}
    #legend{position:fixed;right:18px;top:50%;transform:translateY(-50%);z-index:10;pointer-events:auto;display:flex;flex-direction:column;gap:6px;width:240px;max-height:72vh;overflow-y:auto;background:rgba(10,10,20,.68);padding:14px 16px;border:1px solid rgba(120,100,220,.22);border-radius:10px;backdrop-filter:blur(8px);box-shadow:0 8px 28px rgba(0,0,0,.35)}
    #legend .legend-title{font-size:14px;font-weight:700;color:#e0d8f0;margin-bottom:4px;letter-spacing:.04em}
    #legend .legend-item{display:flex;align-items:center;gap:8px;font-size:14px;line-height:1.45;color:#c9bee4;padding:4px 0;cursor:pointer;border-radius:6px;transition:color .15s,background .15s,transform .15s}
    #legend .legend-item:hover{color:#fff;background:rgba(120,100,220,.16);transform:translateX(-2px)}
    #legend .legend-item.active{color:#fff;background:linear-gradient(90deg,rgba(130,100,255,.32),rgba(80,60,150,.14));box-shadow:inset 3px 0 0 rgba(210,195,255,.8)}
    #legend .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}
    #loading{position:fixed;top:0;left:0;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:#0a0a0f;color:#c0b8d0;transition:opacity .5s}
    #loading.hidden{opacity:0;pointer-events:none}
    .loader{width:32px;height:32px;border:2px solid rgba(100,80,200,.2);border-top-color:#8870d0;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="loading"><div class="loader"></div><div>Loading knowledge graph...</div></div>
  <div id="info"><h1>&#x1f9e0; 3D知识图谱</h1><p>35 个知识单元 &middot; 228 个概念 &middot; 170 条关系</p></div>
  <div id="legend"></div>
  <div id="tooltip"><div class="tt-title"></div><div><span class="tt-type"></span></div><div class="tt-community"></div></div>
  <div id="controls">
    <button id="btn-auto">&#x27f3; 自动旋转</button>
    <a href="index.html">&#x2190; 返回首页</a>
    <input id="search-box" type="text" placeholder="搜索节点...">
  </div>
  <div id="graph-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.70.0/dist/3d-force-graph.min.js"></script>
<script src="graph.js"></script>
</body>
</html>
