<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Knowledge Graph</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0f;color:#c0b8d0;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh}
    #graph-container{width:100vw;height:100vh;position:fixed;top:0;left:0}
    #info{position:fixed;top:20px;left:20px;z-index:10;pointer-events:none}
    #info h1{font-size:18px;font-weight:600;color:#e0d8f0;text-shadow:0 0 20px rgba(100,80,200,.5)}
    #info p{font-size:12px;color:#8880a0;margin-top:4px}
    #tooltip{position:fixed;z-index:20;background:rgba(15,15,30,.92);border:1px solid rgba(120,100,220,.4);border-radius:8px;padding:10px 14px;font-size:13px;max-width:300px;pointer-events:none;opacity:0;transition:opacity .15s;backdrop-filter:blur(8px);box-shadow:0 4px 20px rgba(0,0,0,.6)}
    #tooltip.visible{opacity:1}
    #tooltip .tt-title{color:#e0d8f0;font-weight:600;margin-bottom:4px}
    #tooltip .tt-type{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(120,100,220,.2);color:#a090d0;margin-bottom:4px}
    #tooltip .tt-community{font-size:11px;color:#8070a0}
    #controls{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;align-items:center}
    #controls button,#controls a{background:rgba(30,25,50,.8);border:1px solid rgba(100,80,200,.3);color:#c0b8d0;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;backdrop-filter:blur(4px);transition:all .2s;text-decoration:none}
    #controls button:hover,#controls a:hover{background:rgba(60,50,120,.6);border-color:rgba(140,120,240,.5)}
    #search-box{background:rgba(15,15,30,.85);border:1px solid rgba(100,80,200,.3);color:#c0b8d0;padding:6px 12px;border-radius:6px;font-size:12px;width:200px;outline:none;backdrop-filter:blur(4px)}
    #search-box:focus{border-color:rgba(140,120,240,.6)}
    #search-box::placeholder{color:#605070}
    #legend{position:fixed;right:16px;top:50%;transform:translateY(-50%);z-index:10;pointer-events:none;display:flex;flex-direction:column;gap:3px;background:rgba(10,10,20,.5);padding:8px;border-radius:6px;backdrop-filter:blur(4px)}
    #legend .legend-item{display:flex;align-items:center;gap:5px;font-size:9px;color:#9080a8}
    #legend .legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    #loading{position:fixed;top:0;left:0;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:#0a0a0f;color:#c0b8d0;transition:opacity .5s}
    #loading.hidden{opacity:0;pointer-events:none}
    .loader{width:32px;height:32px;border:2px solid rgba(100,80,200,.2);border-top-color:#8870d0;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="loading"><div class="loader"></div><div>Loading knowledge graph...</div></div>
  <div id="info"><h1>&#x1f9e0; 3D Knowledge Graph</h1><p>35 units &middot; 228 concepts &middot; 170 relationships</p></div>
  <div id="legend"></div>
  <div id="tooltip"><div class="tt-title"></div><div><span class="tt-type"></span></div><div class="tt-community"></div></div>
  <div id="controls">
    <button id="btn-auto" onclick="window.GR=!window.GR;this.textContent=window.GR?'&#x27f3; Auto-rotate':'&#x23f8; Stop'">&#x27f3; Auto-rotate</button>
    <a href="index.html">&#x2190; Back to main</a>
    <input id="search-box" type="text" placeholder="Search nodes..." oninput="searchNodes(this.value)">
  </div>
  <div id="graph-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.163/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph/dist/3d-force-graph.min.js"></script>
<script src="graph.js"></script>
</body>
</html>
