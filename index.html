<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGPT 备份</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bd:#30363d;--tx:#e6edf3;--tx2:#8b949e;--ac:#58a6ff;--ac2:#1f6feb;--err:#f85149;--ok:#3fb950}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden}
/* 锁屏 */
#lock{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:18px}
.lock-card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:36px 32px;width:380px;max-width:90vw;text-align:center}
.lock-card h1{font-size:20px;margin-bottom:6px}
.lock-card p{color:var(--tx2);font-size:13px;margin-bottom:22px}
.lock-card input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:14px;outline:none}
.lock-card input:focus{border-color:var(--ac)}
.lock-card .err{color:var(--err);font-size:12px;margin-top:10px;min-height:16px}
.btn{background:var(--ac2);color:#fff;border:none;border-radius:8px;padding:11px 18px;font-size:14px;cursor:pointer;width:100%;margin-top:14px;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.5;cursor:wait}
.lock-hint{color:var(--tx2);font-size:11px;margin-top:14px;line-height:1.6}
/* 主界面 */
#app{display:none;height:100vh;grid-template-columns:300px 1fr}
.side{background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.side-head{padding:12px;border-bottom:1px solid var(--bd);display:flex;gap:8px;align-items:center}
.side-head .badge{font-size:11px;color:var(--ok);background:rgba(63,185,80,.12);padding:3px 8px;border-radius:10px}
.search{width:100%;padding:8px 12px;background:var(--bg3);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:13px;outline:none;margin-bottom:8px}
.conv-list{flex:1;overflow-y:auto}
.conv-item{padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .12s}
.conv-item:hover{background:var(--bg3)}
.conv-item.active{background:var(--ac2);color:#fff}
.conv-item .t{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-item .d{font-size:11px;color:var(--tx2);margin-top:3px}
.conv-item.active .d{color:rgba(255,255,255,.7)}
.lock-btn{background:none;border:1px solid var(--bd);color:var(--tx2);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;white-space:nowrap}
.lock-btn:hover{color:var(--tx);border-color:var(--ac)}
.main{overflow-y:auto;padding:32px 48px}
.main-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--tx2);font-size:14px}
.conv-view{max-width:820px;margin:0 auto}
.conv-view h1{font-size:24px;margin-bottom:8px;font-weight:600}
.conv-meta{color:var(--tx2);font-size:12px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--bd)}
.msg{margin-bottom:28px}
.msg-head{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.msg-head .tag{color:var(--tx2);font-weight:400;font-size:11px}
.msg-body{line-height:1.7;font-size:14px}
.msg-body p{margin-bottom:10px}
.msg-body img{max-width:100%;border-radius:8px;border:1px solid var(--bd);margin:8px 0}
.msg-body pre{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:14px;overflow-x:auto;font-size:13px;margin:10px 0}
.msg-body code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:13px}
.msg-body pre code{background:none;padding:0}
.msg-body table{border-collapse:collapse;width:100%;margin:10px 0}
.msg-body th,.msg-body td{border:1px solid var(--bd);padding:8px 12px;text-align:left;font-size:13px}
.role-user .msg-head{color:#79c0ff}
.role-assistant .msg-head{color:#56d364}
.role-tool .msg-head{color:#d2a8ff}
.loader{color:var(--tx2);font-size:13px;text-align:center;padding:40px}
</style>
</head>
<body>

<div id="lock">
  <div class="lock-card">
    <h1>🔒 ChatGPT 备份</h1>
    <p>输入密码以解密查看对话</p>
    <input type="password" id="pw" placeholder="密码" autocomplete="off">
    <div class="err" id="lockErr"></div>
    <button class="btn" id="unlockBtn">解密</button>
    <div class="lock-hint">数据使用 AES-256-GCM 加密<br>密码不存储、不上传,仅在你的浏览器本地解密</div>
  </div>
</div>

<div id="app">
  <div class="side">
    <div class="side-head">
      <input type="text" class="search" id="search" placeholder="搜索对话...">
    </div>
    <div class="conv-list" id="convList"></div>
    <div style="padding:10px;border-top:1px solid var(--bd)">
      <button class="lock-btn" id="lockBtn">🔒 重新锁定</button>
    </div>
  </div>
  <div class="main" id="main">
    <div class="main-empty">选择左侧对话查看</div>
  </div>
</div>

<script src="cfg.js"></script>
<script>
let KEY=null, CONVS=[], currentId=null;

const $=id=>document.getElementById(id);
const enc=new TextEncoder(), dec=new TextDecoder();

function b64ToBytes(b){return Uint8Array.from(atob(b),c=>c.charCodeAt(0))}

async function deriveKey(password){
  const km=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:b64ToBytes(window.CFG.SALT_B64),iterations:window.CFG.ITERATIONS,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['decrypt']
  );
}

async function decryptBuf(buf){
  const iv=buf.slice(0,12), ct=buf.slice(12);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},KEY,ct);
  return dec.decode(pt);
}

async function fetchDec(path){
  const r=await fetch(path);
  if(!r.ok) throw new Error('加载失败 '+path+' '+r.status);
  return decryptBuf(await r.arrayBuffer());
}

function fmtDate(s){
  if(!s||s==='未知') return '';
  try{return new Date(s).toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}
  catch{return s}
}

async function unlock(){
  const pw=$('pw').value;
  if(!pw){$('lockErr').textContent='请输入密码';return}
  $('unlockBtn').disabled=true; $('lockErr').textContent='';
  try{
    KEY=await deriveKey(pw);
    const manifest=JSON.parse(await fetchDec('manifest.enc'));
    CONVS=(manifest.conversations||[]).sort((a,b)=>(b.update_time||'').localeCompare(a.update_time||''));
    $('lock').style.display='none';
    $('app').style.display='grid';
    renderList('');
  }catch(e){
    KEY=null;
    $('lockErr').textContent='密码错误或数据损坏';
  }finally{$('unlockBtn').disabled=false}
}

function renderList(q){
  q=q.trim().toLowerCase();
  const list=$('convList');
  list.innerHTML='';
  const filtered=CONVS.filter(c=>!q||(c.title||'').toLowerCase().includes(q));
  if(!filtered.length){list.innerHTML='<div class="loader">无匹配</div>';return}
  for(const c of filtered){
    const d=document.createElement('div');
    d.className='conv-item'+(c.id===currentId?' active':'');
    d.innerHTML=`<div class="t">${esc(c.title||'无标题')}</div><div class="d">${fmtDate(c.update_time)}</div>`;
    d.onclick=()=>loadConv(c.id);
    list.appendChild(d);
  }
}

function esc(s){return (s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}

async function loadConv(id){
  currentId=id;
  const c=CONVS.find(x=>x.id===id);
  if(!c) return;
  renderList($('search').value);
  const main=$('main');
  main.innerHTML='<div class="loader">解密加载中...</div>';
  try{
    let html=await fetchDec(c.enc||('data/'+id+'.enc'));
    // 用对话元信息头部包裹
    main.innerHTML=`<div class="conv-view"><h1>${esc(c.title||'无标题')}</h1><div class="conv-meta">创建 ${fmtDate(c.create_time)} · 更新 ${fmtDate(c.update_time)}</div><div class="msg-body">${html}</div></div>`;
    main.scrollTop=0;
  }catch(e){
    main.innerHTML='<div class="loader">加载失败: '+esc(e.message)+'</div>';
  }
}

$('unlockBtn').onclick=unlock;
$('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});
$('search').addEventListener('input',e=>renderList(e.target.value));
$('lockBtn').onclick=()=>{location.reload()};
</script>
</body>
</html>
