<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识图录 · 对话原档</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:        oklch(97% 0.010 82);
  --paper-2:      oklch(94.5% 0.012 80);
  --paper-3:      oklch(92% 0.013 78);
  --paper-sunken: oklch(90% 0.014 76);
  --ink:          oklch(26% 0.020 55);
  --ink-2:        oklch(44% 0.016 55);
  --ink-3:        oklch(60% 0.012 55);
  --rule:         oklch(86% 0.010 75);
  --rule-2:       oklch(80% 0.012 75);
  --crimson:      oklch(47% 0.155 28);
  --crimson-deep: oklch(40% 0.140 28);
  --crimson-tint: oklch(94% 0.035 30);
  --crimson-wash: oklch(96% 0.020 32);
  --moss:         oklch(48% 0.090 150);
  --indigo:       oklch(45% 0.10 270);   /* 对话区辅助色(紫蓝,克制) */
  --indigo-wash:  oklch(95% 0.018 275);
  --shadow: 0 1px 2px oklch(40% 0.02 55 / 0.08), 0 4px 12px oklch(40% 0.02 55 / 0.06);
  --maxw: 720px;
  --serif: 'Source Serif 4','Noto Serif SC',Georgia,'Songti SC',serif;
  --display: 'EB Garamond','Noto Serif SC',Georgia,serif;
  --mono: ui-monospace,'SFMono-Regular','Cascadia Code',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--serif);background:var(--paper);color:var(--ink);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:var(--crimson-tint);color:var(--crimson-deep)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--rule);border-radius:8px;border:3px solid var(--paper)}
::-webkit-scrollbar-thumb:hover{background:var(--rule-2)}
.main::-webkit-scrollbar-thumb{border-color:var(--paper)}
.side::-webkit-scrollbar-thumb{border-color:var(--paper-2)}

/* ===== 锁屏 ===== */
#lock{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;background:radial-gradient(ellipse at 50% 30%, var(--paper) 0%, oklch(95% 0.012 80) 100%)}
.lock-card{background:var(--paper);border:1px solid var(--rule);border-radius:4px;padding:48px 44px;width:402px;max-width:90vw;text-align:center;box-shadow:var(--shadow);position:relative}
.lock-card::before{content:"";position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:56px;height:3px;background:var(--crimson);border-radius:0 0 2px 2px}
.lock-card h1{font-family:var(--display);font-size:26px;font-weight:600;margin-bottom:6px;letter-spacing:.2px;color:var(--ink)}
.lock-card .lock-sub{font-family:var(--display);font-style:italic;color:var(--ink-2);font-size:15px;margin-bottom:30px}
.lock-card input{width:100%;padding:12px 14px;background:var(--paper-3);border:1px solid var(--rule);border-radius:3px;color:var(--ink);font-family:var(--serif);font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s}
.lock-card input:focus{border-color:var(--crimson);box-shadow:0 0 0 3px var(--crimson-wash)}
.lock-card .err{color:var(--crimson-deep);font-size:13px;margin-top:10px;min-height:18px;font-style:italic}
.btn{background:var(--ink);color:var(--paper);border:none;border-radius:3px;padding:12px 18px;font-family:var(--serif);font-size:15px;font-weight:500;cursor:pointer;width:100%;margin-top:16px;transition:background .15s}
.btn:hover{background:var(--crimson-deep)}
.btn:disabled{opacity:.45;cursor:wait}
.lock-hint{color:var(--ink-3);font-size:12px;margin-top:20px;line-height:1.7}

/* ===== 主界面 ===== */
#app{display:none;height:100vh;grid-template-columns:300px 1fr}
.side{background:var(--paper-2);border-right:1px solid var(--rule);display:flex;flex-direction:column;overflow:hidden}
.side-head{padding:20px 18px 0;border-bottom:1px solid var(--rule)}
.brand{font-family:var(--display);font-size:15px;font-weight:600;color:var(--ink);display:flex;align-items:baseline;gap:8px;margin-bottom:16px}
.brand .mark{display:inline-block;width:4px;height:16px;background:var(--crimson);border-radius:1px;transform:translateY(2px)}

/* 顶部 tab 切换: 知识图录 / 对话原档 */
.tabs{display:flex;gap:0;margin-bottom:-1px}
.tab{flex:1;padding:10px 8px;text-align:center;font-family:var(--display);font-size:14px;font-weight:500;color:var(--ink-3);cursor:pointer;border:1px solid transparent;border-bottom:none;border-radius:3px 3px 0 0;transition:all .15s;user-select:none;position:relative}
.tab:hover{color:var(--ink-2)}
.tab.active{color:var(--ink);background:var(--paper);border-color:var(--rule)}
.tab.active::after{content:"";position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--crimson)}
.tab .tab-count{font-size:11px;font-weight:400;color:var(--ink-3);font-family:var(--serif);font-style:italic;margin-left:3px}
.tab.active .tab-count{color:var(--crimson)}

.side-tools{padding:14px 0 12px}
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap::before{content:"";position:absolute;left:11px;top:50%;transform:translateY(-50%);width:13px;height:13px;border:1.5px solid var(--ink-3);border-radius:50%}
.search-wrap::after{content:"";position:absolute;left:21px;top:calc(50% + 5px);width:6px;height:1.5px;background:var(--ink-3);transform:rotate(45deg);transform-origin:left}
.search{width:100%;padding:9px 12px 9px 32px;background:var(--paper);border:1px solid var(--rule);border-radius:3px;color:var(--ink);font-family:var(--serif);font-size:13.5px;outline:none;transition:border-color .15s}
.search:focus{border-color:var(--crimson)}
.search::placeholder{color:var(--ink-3);font-style:italic}
.tag-bar{display:flex;flex-wrap:wrap;gap:5px;max-height:72px;overflow-y:auto}
.tag-bar.hidden{display:none}
.tag-chip{font-family:var(--serif);font-size:11.5px;color:var(--crimson-deep);background:var(--crimson-wash);padding:3px 9px;border-radius:2px;cursor:pointer;border:1px solid transparent;transition:all .12s;user-select:none}
.tag-chip:hover{border-color:var(--crimson)}
.tag-chip.active{background:var(--crimson);color:var(--paper);font-weight:500}

.item-list{flex:1;overflow-y:auto;padding:6px 8px}
.item{padding:12px 14px;border-radius:3px;cursor:pointer;transition:background .12s;margin-bottom:1px;border-left:2px solid transparent}
.item:hover{background:var(--paper)}
.item.active{background:var(--paper);border-left-color:var(--crimson)}
.item .t{font-family:var(--display);font-size:14.5px;font-weight:600;line-height:1.35;margin-bottom:4px;color:var(--ink)}
.item.active .t{color:var(--crimson-deep)}
.item .s{font-family:var(--serif);font-size:12.5px;color:var(--ink-2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item .meta{margin-top:5px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.item .mini-tags{display:flex;flex-wrap:wrap;gap:4px}
.item .mini-tags .mt{font-size:10.5px;color:var(--ink-3);font-style:italic}
.item .mini-meta{font-size:10.5px;color:var(--ink-3);font-family:var(--serif)}
.item .mini-meta .sep{margin:0 3px;opacity:.5}
.side-foot{padding:10px 18px;border-top:1px solid var(--rule)}
.lock-btn{background:none;border:1px solid var(--rule);color:var(--ink-2);border-radius:3px;padding:6px 12px;font-family:var(--serif);font-size:12.5px;cursor:pointer;transition:all .12s}
.lock-btn:hover{color:var(--crimson-deep);border-color:var(--crimson)}

/* ===== 内容区 ===== */
.main{overflow-y:auto;padding:56px 64px 140px;position:relative;background:var(--paper)}
.main-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--ink-3);font-family:var(--display);font-style:italic;font-size:16px;flex-direction:column;gap:14px}
.main-empty .big{font-size:52px;opacity:.35}

/* --- 知识单元视图(图录) --- */
.unit-view{max-width:var(--maxw);margin:0 auto}
.uv-head{margin-bottom:36px;padding-bottom:26px;border-bottom:1px solid var(--rule)}
.unit-view h1{font-family:var(--display);font-size:34px;font-weight:600;line-height:1.22;margin-bottom:14px;letter-spacing:-.2px;color:var(--ink)}
.uv-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.uv-tags .tag{font-family:var(--serif);font-size:12px;color:var(--crimson-deep);background:var(--crimson-wash);padding:3px 11px;border-radius:2px;font-weight:500;letter-spacing:.3px}
.summary{font-family:var(--display);font-style:italic;color:var(--ink-2);font-size:17px;line-height:1.7;margin-top:18px;padding:18px 22px;background:var(--crimson-wash);border-left:3px solid var(--crimson);border-radius:0 3px 3px 0}

/* --- 对话视图(原档) --- */
.conv-view{max-width:820px;margin:0 auto}
.cv-head{margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--rule)}
.conv-view h1{font-family:var(--display);font-size:30px;font-weight:600;line-height:1.25;margin-bottom:12px;color:var(--ink)}
.cv-meta{display:flex;flex-wrap:wrap;gap:14px;font-family:var(--serif);font-size:13px;color:var(--ink-3)}
.cv-meta span{display:inline-flex;align-items:center;gap:5px}
.cv-meta .mi{color:var(--crimson);font-size:14px}

/* 对话轮次 */
.conv-turn{margin-bottom:28px;position:relative}
.turn-head{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px dotted var(--rule)}
.turn-emoji{font-size:15px}
.turn-label{font-family:var(--display);font-weight:600;font-size:14px;color:var(--ink)}
.turn-ts{font-family:var(--serif);font-size:11.5px;color:var(--ink-3);margin-left:auto;font-style:italic}
.turn-user .turn-label{color:var(--crimson-deep)}
.turn-ai .turn-label{color:var(--indigo)}
.turn-tool .turn-label{color:var(--ink-3);font-style:italic;font-size:13px}
.turn-user .turn-head{border-bottom-color:var(--crimson-tint)}
.turn-ai .turn-head{border-bottom-color:var(--indigo-wash)}
.turn-tool .turn-head{border-bottom-color:var(--rule)}
.turn-body{padding-left:2px}
.turn-ai .turn-body{background:var(--paper-2);padding:16px 20px;border-radius:0 3px 3px 0;border-left:2px solid var(--indigo-wash)}
.turn-tool .turn-body{background:var(--paper-3);padding:12px 18px;border-radius:0 3px 3px 0;border-left:2px solid var(--rule);font-size:14px;color:var(--ink-2)}
.turn-tool .turn-body::before{content:"工具输出";display:block;font-family:var(--display);font-style:italic;font-size:11px;color:var(--ink-3);margin-bottom:6px}
.fold-btn{margin-left:auto;background:none;border:1px solid var(--rule);color:var(--ink-3);cursor:pointer;font-family:var(--display);font-size:11.5px;padding:2px 10px;border-radius:2px;transition:all .12s;white-space:nowrap}
.fold-btn:hover{background:var(--paper);color:var(--crimson-deep);border-color:var(--crimson-tint)}
.collapsible-user .turn-body{max-height:320px;overflow:hidden;position:relative;transition:max-height .3s ease}
.collapsible-user .turn-body::after{content:"";position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(to bottom,transparent,var(--paper));pointer-events:none}
.collapsible-user.expanded .turn-body{max-height:none}
.collapsible-user.expanded .turn-body::after{display:none}

/* --- 共用正文样式 --- */
.content,.turn-body{line-height:1.85;font-size:16px;color:var(--ink);font-family:var(--serif)}
.content h3,.turn-body h4{font-family:var(--display);font-weight:600;margin:30px 0 10px;scroll-margin-top:24px;color:var(--ink)}
.content h3{font-size:23px;padding-bottom:7px;border-bottom:1px solid var(--rule);position:relative}
.content h3::before{content:"§";position:absolute;left:-1.4em;top:0;color:var(--crimson);font-style:italic;font-weight:400;opacity:.7}
.content h3:first-child{margin-top:10px}
.turn-body h4{font-size:17px}
.content p,.turn-body p{margin-bottom:14px}
.content p:last-child,.turn-body p:last-child{margin-bottom:0}
.content ul,.content ol,.turn-body ul,.turn-body ol{margin:12px 0 16px;padding-left:26px}
.content li,.turn-body li{margin-bottom:6px;line-height:1.75}
.content ul li::marker,.turn-body ul li::marker{color:var(--crimson);content:"- "}
.content ol li::marker,.turn-body ol li::marker{color:var(--crimson-deep);font-weight:600}
.content blockquote,.turn-body blockquote{margin:18px 0;padding:12px 20px;border-left:3px solid var(--crimson);background:var(--paper-2);border-radius:0 3px 3px 0;color:var(--ink-2);font-family:var(--display);font-style:italic;font-size:15px}
.content blockquote strong,.turn-body blockquote strong{color:var(--ink);font-style:normal;font-family:var(--serif);font-weight:600}

/* 行内code + 代码块 */
.content code,.turn-body code{font-family:var(--mono);background:var(--paper-3);color:oklch(42% 0.05 50);padding:2px 6px;border-radius:2px;font-size:13px}
.content pre,.turn-body pre{background:var(--paper-3);border:1px solid var(--rule);border-radius:4px;margin:18px 0;overflow:hidden;position:relative}
.content pre .code-hd,.turn-body pre .code-hd{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:var(--paper-sunken);border-bottom:1px solid var(--rule);font-size:11.5px}
.content pre .code-hd .lang,.turn-body pre .code-hd .lang{color:var(--ink-3);font-family:var(--mono);font-style:italic}
.content pre .copy-btn,.turn-body pre .copy-btn{background:none;border:none;color:var(--ink-3);cursor:pointer;font-family:var(--serif);font-size:12px;padding:2px 8px;border-radius:2px;transition:all .12s}
.content pre .copy-btn:hover,.turn-body pre .copy-btn:hover{background:var(--paper);color:var(--crimson-deep)}
.content pre .copy-btn.copied,.turn-body pre .copy-btn.copied{color:var(--moss)}
.content pre code,.turn-body pre code{display:block;background:none;color:var(--ink);padding:14px 18px;overflow-x:auto;font-size:13px;line-height:1.65;border-radius:0}
.tok-kw{color:oklch(45% 0.11 28);font-weight:500}
.tok-str{color:oklch(42% 0.08 145)}
.tok-num{color:oklch(40% 0.07 70)}
.tok-cmt{color:var(--ink-3);font-style:italic}

/* 图片 */
.content img,.turn-body img{max-width:100%;border-radius:3px;border:1px solid var(--rule);margin:16px 0;background:var(--paper-2);box-shadow:var(--shadow);cursor:zoom-in;transition:transform .2s,box-shadow .2s;display:block}
.content img:hover,.turn-body img:hover{transform:scale(1.008);box-shadow:0 2px 4px oklch(40% 0.02 55 / .1),0 8px 20px oklch(40% 0.02 55 / .1)}
.content img[data-asset]:not([src]),.turn-body img[data-asset]:not([src]){min-height:56px;display:flex;align-items:center;justify-content:center}
.content img[data-asset]:not([src])::before,.turn-body img[data-asset]:not([src])::before{content:"正在显影图版…";color:var(--ink-3);font-family:var(--display);font-style:italic;font-size:13px}

/* 单元互链 */
.unit-link{color:var(--crimson-deep);text-decoration:none;border-bottom:1px solid var(--crimson-tint);padding:0 1px;cursor:pointer;transition:all .12s;font-weight:500}
.unit-link::before{content:"↗ ";font-size:.8em;opacity:.6;font-weight:400}
.unit-link:hover{background:var(--crimson-wash);border-bottom-color:var(--crimson)}
.unit-link:visited{color:var(--moss)}
.broken-link{color:var(--ink-3);text-decoration:line-through dotted;cursor:help}

/* 表格 */
.content table,.turn-body table{border-collapse:collapse;width:100%;margin:20px 0;font-size:14px;font-family:var(--serif);border-top:2px solid var(--ink);border-bottom:2px solid var(--ink)}
.content th,.turn-body th{font-family:var(--display);color:var(--ink);font-weight:600;text-align:left;padding:10px 16px;border-bottom:1.5px solid var(--rule-2)}
.content td,.turn-body td{padding:9px 16px;color:var(--ink-2)}
.content tbody tr,.turn-body tbody tr{border-bottom:1px solid var(--rule)}
.content tbody tr:last-child,.turn-body tbody tr:last-child{border-bottom:none}
.content tbody tr:hover td,.turn-body tbody tr:hover td{background:var(--paper-2);color:var(--ink)}

.content hr{border:none;height:1px;background:var(--rule);margin:40px auto;width:40%;position:relative}
.content hr::before{content:"❧";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--paper);padding:0 14px;color:var(--crimson);font-family:var(--display);font-size:15px}

.loader{color:var(--ink-3);font-family:var(--display);font-style:italic;font-size:15px;text-align:center;padding:70px}
.loader .spin{display:inline-block;width:15px;height:15px;border:2px solid var(--rule);border-top-color:var(--crimson);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:9px}
@keyframes spin{to{transform:rotate(360deg)}}

#toTop{position:fixed;bottom:34px;right:40px;width:40px;height:40px;border-radius:50%;background:var(--paper);border:1px solid var(--rule-2);color:var(--crimson-deep);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--shadow);transition:all .15s;z-index:50}
#toTop:hover{background:var(--crimson);color:var(--paper);border-color:var(--crimson);transform:translateY(-2px)}
#toTop.show{display:flex}

#lightbox{position:fixed;inset:0;background:oklch(20% 0.015 55 / .94);display:none;align-items:center;justify-content:center;z-index:100;cursor:zoom-out;padding:44px;backdrop-filter:blur(2px)}
#lightbox.show{display:flex}
#lightbox img{max-width:92%;max-height:92%;border-radius:3px;box-shadow:0 0 80px oklch(20% 0.02 55 / .7);border:1px solid oklch(40% 0.02 55 / .3)}
#lightbox .lb-close{position:absolute;top:22px;right:32px;color:oklch(80% 0.01 75);font-size:34px;cursor:pointer;line-height:1;font-family:var(--display)}
</style>
</head>
<body>

<div id="lock">
  <div class="lock-card">
    <h1>知识图录</h1>
    <div class="lock-sub">Verba volant, scripta manent</div>
    <input type="password" id="pw" placeholder="输入密钥以启封" autocomplete="off">
    <div class="err" id="lockErr"></div>
    <button class="btn" id="unlockBtn">启封卷宗</button>
    <div class="lock-hint">所载之事以 AES-256-GCM 封缄<br>密钥不存不传,唯于此卷启阅</div>
  </div>
</div>

<div id="app">
  <div class="side">
    <div class="side-head">
      <div class="brand"><span class="mark"></span>知识图录</div>
      <div class="tabs">
        <div class="tab active" data-tab="wiki">知识图录<span class="tab-count" id="cntWiki"></span></div>
        <div class="tab" data-tab="conv">对话原档<span class="tab-count" id="cntConv"></span></div>
        <a class="tab" href="graph.html">3D知识图谱</a>
      </div>
      <div class="side-tools">
        <div class="search-wrap"><input type="text" class="search" id="search" placeholder="检索篇目…"></div>
        <div class="tag-bar" id="tagBar"></div>
      </div>
    </div>
    <div class="item-list" id="itemList"></div>
    <div class="side-foot">
      <button class="lock-btn" id="lockBtn">重新封存</button>
    </div>
  </div>
  <div class="main" id="main">
    <div class="main-empty"><div class="big">❦</div><div>择左栏篇目以阅</div></div>
  </div>
  <div id="toTop">↑</div>
</div>

<div id="lightbox"><span class="lb-close">×</span><img></div>

<script src="cfg.js"></script>
<script>
let KEY=null, UNITS=[], CONVS=[], ALL_TAGS=[], activeTag=null, currentTab='wiki', currentId=null;
const $=id=>document.getElementById(id);
const enc=new TextEncoder(), dec=new TextDecoder();
const imgCache={};

function b64ToBytes(b){return Uint8Array.from(atob(b),c=>c.charCodeAt(0))}
async function deriveKey(pw){
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64ToBytes(window.CFG.SALT_B64),iterations:window.CFG.ITERATIONS,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function decryptBuf(buf){const iv=buf.slice(0,12),ct=buf.slice(12);return dec.decode(await crypto.subtle.decrypt({name:'AES-GCM',iv},KEY,ct))}
async function decryptBytes(buf){const iv=buf.slice(0,12),ct=buf.slice(12);return new Uint8Array(await crypto.subtle.decrypt({name:'AES-GCM',iv},KEY,ct))}
async function fetchDec(path){const r=await fetch(path);if(!r.ok)throw new Error(path+' '+r.status);return decryptBuf(await r.arrayBuffer())}
async function fetchDecBytes(url){const r=await fetch(url);if(!r.ok)throw new Error(url+' '+r.status);return decryptBytes(await r.arrayBuffer())}
function esc(s){return (s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}

async function unlock(){
  const pw=$('pw').value;
  if(!pw){$('lockErr').textContent='请输入密钥';return}
  $('unlockBtn').disabled=true;$('lockErr').textContent='';
  try{
    KEY=await deriveKey(pw);
    const manifest=JSON.parse(await fetchDec('manifest.enc'));
    UNITS=(manifest.units||[]).sort((a,b)=>(b.title||'').localeCompare(a.title||''));
    CONVS=(manifest.convs||[]).sort((a,b)=>(b.update_time||'').localeCompare(a.update_time||''));
    $('cntWiki').textContent=UNITS.length?' ·'+UNITS.length:'';
    $('cntConv').textContent=CONVS.length?' ·'+CONVS.length:'';
    const tagSet=new Set();UNITS.forEach(u=>(u.tags||[]).forEach(t=>tagSet.add(t)));
    ALL_TAGS=[...tagSet].sort();
    $('lock').style.display='none';$('app').style.display='grid';
    switchTab('wiki');
  }catch(e){KEY=null;$('lockErr').textContent='密钥不合,或卷已损'}
  finally{$('unlockBtn').disabled=false}
}

function switchTab(tab){
  currentTab=tab;activeTag=null;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  // 标签栏只对 wiki 有意义
  $('tagBar').classList.toggle('hidden',tab!=='wiki');
  renderTags();renderList($('search').value);
  $('main').innerHTML='<div class="main-empty"><div class="big">❦</div><div>择左栏篇目以阅</div></div>';
  currentId=null;
}

function currentItems(){return currentTab==='wiki'?UNITS:CONVS}

function renderTags(){
  const bar=$('tagBar');bar.innerHTML='';
  if(currentTab!=='wiki')return;
  if(activeTag){const c=document.createElement('span');c.className='tag-chip active';c.textContent='全部';c.onclick=()=>{activeTag=null;renderTags();renderList($('search').value)};bar.appendChild(c)}
  for(const t of ALL_TAGS){const c=document.createElement('span');c.className='tag-chip'+(t===activeTag?' active':'');c.textContent=t;c.onclick=()=>{activeTag=(activeTag===t?null:t);renderTags();renderList($('search').value)};bar.appendChild(c)}
}

function renderList(q){
  q=q.trim().toLowerCase();const list=$('itemList');list.innerHTML='';
  const items=currentItems();
  const filtered=items.filter(u=>{
    if(currentTab==='wiki'&&activeTag&&!(u.tags||[]).includes(activeTag))return false;
    if(!q)return true;
    return(u.title||'').toLowerCase().includes(q)||(u.summary||'').toLowerCase().includes(q);
  });
  if(!filtered.length){list.innerHTML='<div class="loader">无相合者</div>';return}
  for(const u of filtered){
    const d=document.createElement('div');d.className='item'+(u.id===currentId||u.slug===currentId?' active':'');
    if(currentTab==='wiki'){
      const mt=(u.tags||[]).slice(0,3).map(t=>`<span class="mt">${esc(t)}</span>`).join(' ');
      d.innerHTML=`<div class="t">${esc(u.title||u.slug)}</div><div class="s">${esc(u.summary||'')}</div>${mt?`<div class="mini-tags">${mt}</div>`:''}`;
      d.onclick=()=>loadUnit(u.slug);
    }else{
      const date=(u.update_time||'').slice(0,10);
      const meta=`<span class="mini-meta">${esc(date)}<span class="sep">·</span>${u.msg_count||0}则<span class="sep">·</span>${u.img_count?u.img_count+'图':''}</span>`;
      d.innerHTML=`<div class="t">${esc(u.title)}</div><div class="s">${esc(u.summary||'')}</div><div class="meta">${meta}</div>`;
      d.onclick=()=>loadConv(u.id);
    }
    list.appendChild(d);
  }
}

function highlight(code){
  return esc(code)
    .replace(/(\/\/[^\n]*|#[^\n]*)/g,'<span class="tok-cmt">$1</span>')
    .replace(/(&quot;[^&]*?&quot;|&#039;[^&]*?&#039;)/g,'<span class="tok-str">$1</span>')
    .replace(/\b(\d+\.?\d*)\b/g,'<span class="tok-num">$1</span>')
    .replace(/\b(def|class|import|from|return|if|else|elif|for|while|try|except|with|as|in|not|and|or|None|True|False|function|const|let|var|return|if|else|for|while|await|async|new|this)\b/g,'<span class="tok-kw">$1</span>');
}

function setupCodeBlocks(container){
  container.querySelectorAll('pre').forEach(pre=>{
    const code=pre.querySelector('code');if(!code)return;
    const raw=code.textContent;code.innerHTML=highlight(raw);
    const hd=document.createElement('div');hd.className='code-hd';
    const lang=document.createElement('span');lang.className='lang';lang.textContent='codex';
    const btn=document.createElement('button');btn.className='copy-btn';btn.textContent='誊录';
    btn.onclick=()=>{navigator.clipboard.writeText(raw);btn.textContent='已录';btn.classList.add('copied');setTimeout(()=>{btn.textContent='誊录';btn.classList.remove('copied')},1500)};
    hd.appendChild(lang);hd.appendChild(btn);pre.insertBefore(hd,code);
  });
}

async function loadAssetImages(container){
  const imgs=container.querySelectorAll('img[data-asset]');
  for(const img of imgs){
    const url=img.dataset.src;if(!url)continue;
    try{
      if(!imgCache[url]){imgCache[url]=fetchDecBytes(url).then(bytes=>{
        const ext=(img.dataset.asset||'').split('.').pop().toLowerCase();
        const mime={'png':'image/png','jpg':'image/jpeg','jpeg':'image/jpeg','gif':'image/gif','webp':'image/webp','bmp':'image/bmp','svg':'image/svg+xml'}[ext]||'image/png';
        return URL.createObjectURL(new Blob([bytes],{type:mime}));
      })}
      img.src=await imgCache[url];
      img.onclick=()=>openLightbox(img.src);
    }catch(e){img.alt='显影失败';img.style.padding='24px'}
  }
}

async function loadUnit(slug){
  currentId=slug;const u=UNITS.find(x=>x.slug===slug);if(!u)return;
  renderList($('search').value);const main=$('main');
  main.innerHTML='<div class="loader"><span class="spin"></span>启封中…</div>';
  $('toTop').classList.remove('show');
  try{
    let html=await fetchDec(u.enc||('data/'+slug+'.enc'));
    const tags=(u.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
    main.innerHTML=`<div class="unit-view"><div class="uv-head"><h1>${esc(u.title||u.slug)}</h1>`+
      (tags?`<div class="uv-tags">${tags}</div>`:'')+
      (u.summary?`<div class="summary">${esc(u.summary)}</div>`:'')+
      `</div><div class="content">${html}</div></div>`;
    main.scrollTop=0;
    setupCodeBlocks(main);
    await loadAssetImages(main);
    main.querySelectorAll('.unit-link').forEach(a=>{a.onclick=(e)=>{e.preventDefault();loadUnit(a.dataset.unit)}});
  }catch(e){main.innerHTML='<div class="loader">启封失败: '+esc(e.message)+'</div>'}
}

async function loadConv(id){
  currentId=id;const c=CONVS.find(x=>x.id===id);if(!c)return;
  renderList($('search').value);const main=$('main');
  main.innerHTML='<div class="loader"><span class="spin"></span>启封中…</div>';
  $('toTop').classList.remove('show');
  try{
    let html=await fetchDec(c.enc);
    const date=(c.update_time||'').slice(0,10);
    main.innerHTML=`<div class="conv-view"><div class="cv-head"><h1>${esc(c.title)}</h1>`+
      `<div class="cv-meta">`+
      `<span><span class="mi">📅</span>${esc(date)}</span>`+
      `<span><span class="mi">💬</span>${c.msg_count||0} 则消息</span>`+
      (c.img_count?`<span><span class="mi">🖼</span>${c.img_count} 张图</span>`:'')+
      `</div></div><div class="content">${html}</div></div>`;
    main.scrollTop=0;
    setupCodeBlocks(main);
    await loadAssetImages(main);
  }catch(e){main.innerHTML='<div class="loader">启封失败: '+esc(e.message)+'</div>'}
}

function openLightbox(src){const lb=$('lightbox');lb.querySelector('img').src=src;lb.classList.add('show')}
$('lightbox').onclick=()=>$('lightbox').classList.remove('show');
$('main').addEventListener('scroll',()=>{$('toTop').classList.toggle('show',$('main').scrollTop>400)});
$('toTop').onclick=()=>$('main').scrollTo({top:0,behavior:'smooth'});

$('unlockBtn').onclick=unlock;
$('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});
$('search').addEventListener('input',e=>renderList(e.target.value));
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchTab(t.dataset.tab));
$('lockBtn').onclick=()=>location.reload();
</script>
</body>
</html>
