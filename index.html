<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGPT 知识 Wiki</title>
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--bg4:#21262d;--bd:#30363d;--bd2:#484f58;
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#6e7681;
  --ac:#58a6ff;--ac2:#1f6feb;--ac-dim:rgba(56,139,253,.15);
  --err:#f85149;--ok:#3fb950;--tag:#d2a8ff;--tag-bg:rgba(210,168,255,.12);
  --code-bg:#161b22;--code-hd:#0d1117;
  --quote:#8b949e;--quote-bar:#6e7681;
  --shadow:0 8px 24px rgba(1,4,9,.6);
  --maxw:780px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* 滚动条 */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:var(--bd2)}

/* 锁屏 */
#lock{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column}
.lock-card{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:40px 36px;width:400px;max-width:90vw;text-align:center;box-shadow:var(--shadow)}
.lock-card h1{font-size:22px;margin-bottom:8px;letter-spacing:.3px}
.lock-card p{color:var(--tx2);font-size:13px;margin-bottom:24px}
.lock-card input{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:14px;outline:none;transition:border-color .15s}
.lock-card input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac-dim)}
.lock-card .err{color:var(--err);font-size:12px;margin-top:10px;min-height:16px}
.btn{background:var(--ac2);color:#fff;border:none;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-top:14px;transition:opacity .15s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:wait}
.lock-hint{color:var(--tx3);font-size:11px;margin-top:16px;line-height:1.6}

/* 主界面 */
#app{display:none;height:100vh;grid-template-columns:300px 1fr}
.side{background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.side-head{padding:14px;border-bottom:1px solid var(--bd)}
.side-title{font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.side-title .count{font-size:11px;color:var(--tx3);font-weight:400}
.search{width:100%;padding:9px 12px 9px 32px;background:var(--bg3);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:13px;outline:none;transition:border-color .15s}
.search:focus{border-color:var(--ac)}
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.6}
.tag-bar{display:flex;flex-wrap:wrap;gap:5px;max-height:70px;overflow-y:auto}
.tag-chip{font-size:11px;color:var(--tag);background:var(--tag-bg);padding:3px 9px;border-radius:20px;cursor:pointer;border:1px solid transparent;transition:all .12s;user-select:none}
.tag-chip:hover{border-color:var(--tag)}
.tag-chip.active{background:var(--tag);color:var(--bg);font-weight:500}
.unit-list{flex:1;overflow-y:auto;padding:4px}
.unit-item{padding:11px 14px;border-radius:10px;cursor:pointer;transition:background .12s;margin-bottom:2px}
.unit-item:hover{background:var(--bg3)}
.unit-item.active{background:var(--ac2)}
.unit-item .t{font-size:13px;font-weight:500;line-height:1.35;margin-bottom:3px}
.unit-item .s{font-size:11px;color:var(--tx2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.unit-item.active .s{color:rgba(255,255,255,.78)}
.unit-item .mini-tags{margin-top:5px;display:flex;flex-wrap:wrap;gap:3px}
.unit-item .mini-tags .mt{font-size:10px;color:var(--tag);opacity:.8}
.unit-item.active .mini-tags .mt{color:rgba(255,255,255,.7)}
.side-foot{padding:10px 14px;border-top:1px solid var(--bd)}
.lock-btn{background:none;border:1px solid var(--bd);color:var(--tx2);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;transition:all .12s}
.lock-btn:hover{color:var(--tx);border-color:var(--ac)}

/* 内容区 */
.main{overflow-y:auto;padding:40px 56px 120px;position:relative}
.main-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--tx2);font-size:14px;flex-direction:column;gap:12px}
.main-empty .big{font-size:48px;opacity:.5}

.unit-view{max-width:var(--maxw);margin:0 auto}
/* 单元头部 */
.uv-head{margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--bd)}
.unit-view h1{font-size:30px;font-weight:700;line-height:1.25;margin-bottom:12px;letter-spacing:-.3px;color:var(--tx)}
.uv-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.uv-tags .tag{font-size:12px;color:var(--tag);background:var(--tag-bg);padding:3px 11px;border-radius:20px;font-weight:500}
.uv-meta{font-size:12px;color:var(--tx3);display:flex;gap:14px;flex-wrap:wrap}
.uv-meta span::before{content:"";margin-right:0}
.summary{color:var(--tx2);font-size:15px;line-height:1.7;margin-top:14px;padding:14px 18px;background:var(--bg2);border-left:3px solid var(--ac);border-radius:0 10px 10px 0}

/* 正文 */
.content{line-height:1.8;font-size:15px;color:var(--tx)}
.content h3{font-size:20px;font-weight:600;margin:36px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--bd);color:var(--tx);scroll-margin-top:20px}
.content h3:first-child{margin-top:8px}
.content h4{font-size:16px;font-weight:600;margin:26px 0 10px;color:var(--tx);scroll-margin-top:20px}
.content p{margin-bottom:14px}
.content ul,.content ol{margin:10px 0 16px;padding-left:24px}
.content li{margin-bottom:6px;line-height:1.7}
.content ul li::marker{color:var(--ac)}
.content ol li::marker{color:var(--ac);font-weight:600}

/* 引用块 */
.content blockquote{margin:16px 0;padding:12px 18px;border-left:3px solid var(--quote-bar);background:var(--bg2);border-radius:0 8px 8px 0;color:var(--quote);font-style:italic}
.content blockquote strong{color:var(--tx)}

/* 行内代码 */
.content code{font-family:ui-monospace,"SFMono-Regular","Cascadia Code",Menlo,Consolas,monospace;background:var(--bg4);color:#f0883e;padding:2px 7px;border-radius:5px;font-size:13px}
/* 代码块 mac 风格 */
.content pre{background:var(--code-bg);border:1px solid var(--bd);border-radius:12px;margin:18px 0;overflow:hidden;position:relative}
.content pre .code-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--code-hd);border-bottom:1px solid var(--bd);font-size:11px}
.content pre .code-hd .lang{color:var(--tx3);font-family:ui-monospace,monospace}
.content pre .copy-btn{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:11px;padding:2px 8px;border-radius:5px;transition:all .12s}
.content pre .copy-btn:hover{background:var(--bg3);color:var(--tx)}
.content pre .copy-btn.copied{color:var(--ok)}
.content pre code{display:block;background:none;color:var(--tx);padding:14px 16px;overflow-x:auto;font-size:13px;line-height:1.6;border-radius:0}
.content pre code .tok-kw{color:#ff7b72}
.content pre code .tok-str{color:#a5d6ff}
.content pre code .tok-fn{color:#d2a8ff}
.content pre code .tok-num{color:#79c0ff}
.content pre code .tok-cmt{color:var(--tx3);font-style:italic}

/* 图片 */
.content img{max-width:100%;border-radius:10px;border:1px solid var(--bd);margin:14px 0;background:var(--bg2);box-shadow:var(--shadow);cursor:zoom-in;transition:transform .2s;display:block}
.content img:hover{transform:scale(1.005)}
.content img[data-asset]:not([src]){min-height:48px;display:flex;align-items:center;justify-content:center}
.content img[data-asset]:not([src])::before{content:"🖼 解密图片加载中…";color:var(--tx3);font-size:12px}

/* 单元链接 */
.unit-link{color:var(--ac);text-decoration:none;border-bottom:1px dashed var(--ac);padding:0 2px;cursor:pointer;transition:all .12s}
.unit-link::before{content:"🔗 ";font-size:.85em;opacity:.7}
.unit-link:hover{background:var(--ac-dim);border-radius:4px;border-bottom-style:solid}
.broken-link{color:var(--tx3);text-decoration:line-through dotted;cursor:help}

/* 表格 */
.content table{border-collapse:collapse;width:100%;margin:16px 0;font-size:13px;border-radius:8px;overflow:hidden;border:1px solid var(--bd)}
.content th{background:var(--bg3);color:var(--tx);font-weight:600;text-align:left;padding:10px 14px;border-bottom:2px solid var(--bd)}
.content td{padding:9px 14px;border-bottom:1px solid var(--bd);color:var(--tx2)}
.content tbody tr:last-child td{border-bottom:none}
.content tbody tr:hover td{background:var(--bg2)}

/* 水平线 */
.content hr{border:none;height:1px;background:var(--bd);margin:32px 0}

.loader{color:var(--tx2);font-size:13px;text-align:center;padding:60px}
.loader .spin{display:inline-block;width:16px;height:16px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 返回顶部 */
#toTop{position:fixed;bottom:32px;right:32px;width:42px;height:42px;border-radius:50%;background:var(--bg3);border:1px solid var(--bd);color:var(--tx);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--shadow);transition:all .15s;z-index:50}
#toTop:hover{background:var(--ac2);border-color:var(--ac2);transform:translateY(-2px)}
#toTop.show{display:flex}

/* Lightbox */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:100;cursor:zoom-out;padding:40px}
#lightbox.show{display:flex}
#lightbox img{max-width:92%;max-height:92%;border-radius:8px;box-shadow:0 0 60px rgba(0,0,0,.8)}
#lightbox .lb-close{position:absolute;top:20px;right:28px;color:var(--tx3);font-size:32px;cursor:pointer;line-height:1}
</style>
</head>
<body>

<div id="lock">
  <div class="lock-card">
    <h1>🔒 ChatGPT 知识 Wiki</h1>
    <p>输入密码以解密查看</p>
    <input type="password" id="pw" placeholder="密码" autocomplete="off">
    <div class="err" id="lockErr"></div>
    <button class="btn" id="unlockBtn">解密</button>
    <div class="lock-hint">数据使用 AES-256-GCM 加密<br>密码不存储、不上传,仅在你浏览器本地解密</div>
  </div>
</div>

<div id="app">
  <div class="side">
    <div class="side-head">
      <div class="side-title">📚 知识库 <span class="count" id="count"></span></div>
      <div class="search-wrap"><input type="text" class="search" id="search" placeholder="搜索标题/摘要..."></div>
      <div class="tag-bar" id="tagBar"></div>
    </div>
    <div class="unit-list" id="unitList"></div>
    <div class="side-foot">
      <button class="lock-btn" id="lockBtn">🔒 重新锁定</button>
    </div>
  </div>
  <div class="main" id="main">
    <div class="main-empty"><div class="big">📚</div><div>选择左侧知识单元查看</div></div>
  </div>
  <div id="toTop">↑</div>
</div>

<div id="lightbox"><span class="lb-close">×</span><img></div>

<script src="cfg.js"></script>
<script>
let KEY=null, UNITS=[], ALL_TAGS=[], activeTag=null, currentSlug=null;
const $=id=>document.getElementById(id);
const enc=new TextEncoder(), dec=new TextDecoder();
const imgCache={};

function b64ToBytes(b){return Uint8Array.from(atob(b),c=>c.charCodeAt(0))}
async function deriveKey(pw){
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64ToBytes(window.CFG.SALT_B64),iterations:window.CFG.ITERATIONS,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function decryptBuf(buf){const iv=buf.slice(0,12),ct=buf.slice(12);return dec.decode(await crypto.subtle.decrypt({name:'AES-GCM',iv},KEY,ct))}
async function decryptBytes(buf){const iv=buf.slice(0,12),ct=buf.slice(12);return new Uint8Array(await crypto.subtle.decrypt({name:'AES-GCM',iv},KEY,ct))}
async function fetchDec(path){const r=await fetch(path);if(!r.ok)throw new Error(path+' '+r.status);return decryptBuf(await r.arrayBuffer())}
async function fetchDecBytes(url){const r=await fetch(url);if(!r.ok)throw new Error(url+' '+r.status);return decryptBytes(await r.arrayBuffer())}
function esc(s){return (s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}

async function unlock(){
  const pw=$('pw').value;
  if(!pw){$('lockErr').textContent='请输入密码';return}
  $('unlockBtn').disabled=true;$('lockErr').textContent='';
  try{
    KEY=await deriveKey(pw);
    const manifest=JSON.parse(await fetchDec('manifest.enc'));
    UNITS=(manifest.units||[]).sort((a,b)=>(b.title||'').localeCompare(a.title||''));
    $('count').textContent=`${UNITS.length} 篇`;
    const tagSet=new Set();UNITS.forEach(u=>(u.tags||[]).forEach(t=>tagSet.add(t)));
    ALL_TAGS=[...tagSet].sort();
    $('lock').style.display='none';$('app').style.display='grid';
    renderTags();renderList('');
  }catch(e){KEY=null;$('lockErr').textContent='密码错误或数据损坏'}
  finally{$('unlockBtn').disabled=false}
}

function renderTags(){
  const bar=$('tagBar');bar.innerHTML='';
  if(activeTag){const c=document.createElement('span');c.className='tag-chip active';c.textContent='✕ 全部';c.onclick=()=>{activeTag=null;renderTags();renderList($('search').value)};bar.appendChild(c)}
  for(const t of ALL_TAGS){const c=document.createElement('span');c.className='tag-chip'+(t===activeTag?' active':'');c.textContent=t;c.onclick=()=>{activeTag=(activeTag===t?null:t);renderTags();renderList($('search').value)};bar.appendChild(c)}
}

function renderList(q){
  q=q.trim().toLowerCase();const list=$('unitList');list.innerHTML='';
  const filtered=UNITS.filter(u=>{
    if(activeTag&&!(u.tags||[]).includes(activeTag))return false;
    if(!q)return true;
    return(u.title||'').toLowerCase().includes(q)||(u.summary||'').toLowerCase().includes(q);
  });
  if(!filtered.length){list.innerHTML='<div class="loader">无匹配</div>';return}
  for(const u of filtered){
    const d=document.createElement('div');d.className='unit-item'+(u.slug===currentSlug?' active':'');
    const mt=(u.tags||[]).slice(0,3).map(t=>`<span class="mt">${esc(t)}</span>`).join(' ');
    d.innerHTML=`<div class="t">${esc(u.title||u.slug)}</div><div class="s">${esc(u.summary||'')}</div>${mt?`<div class="mini-tags">${mt}</div>`:''}`;
    d.onclick=()=>loadUnit(u.slug);list.appendChild(d);
  }
}

// 轻量语法高亮:关键词/字符串/注释/数字
function highlight(code){
  return esc(code)
    .replace(/(\/\/[^\n]*|#[^\n]*)/g,'<span class="tok-cmt">$1</span>')
    .replace(/(&quot;[^&]*?&quot;|&#039;[^&]*?&#039;)/g,'<span class="tok-str">$1</span>')
    .replace(/\b(\d+\.?\d*)\b/g,'<span class="tok-num">$1</span>')
    .replace(/\b(def|class|import|from|return|if|else|elif|for|while|try|except|with|as|in|not|and|or|None|True|False|function|const|let|var|return|if|else|for|while|await|async|new|this)\b/g,'<span class="tok-kw">$1</span>');
}

async function loadUnit(slug){
  currentSlug=slug;const u=UNITS.find(x=>x.slug===slug);if(!u)return;
  renderList($('search').value);const main=$('main');
  main.innerHTML='<div class="loader"><span class="spin"></span>解密加载中...</div>';
  $('toTop').classList.remove('show');
  try{
    let html=await fetchDec(u.enc||('data/'+slug+'.enc'));
    const tags=(u.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
    main.innerHTML=`<div class="unit-view"><div class="uv-head"><h1>${esc(u.title||u.slug)}</h1>`+
      (tags?`<div class="uv-tags">${tags}</div>`:'')+
      (u.summary?`<div class="summary">${esc(u.summary)}</div>`:'')+
      `</div><div class="content">${html}</div></div>`;
    main.scrollTop=0;
    // 代码块:加语言标签+复制按钮+高亮
    main.querySelectorAll('pre').forEach(pre=>{
      const code=pre.querySelector('code');if(!code)return;
      const raw=code.textContent;
      code.innerHTML=highlight(raw);
      const hd=document.createElement('div');hd.className='code-hd';
      const lang=document.createElement('span');lang.className='lang';lang.textContent='code';
      const btn=document.createElement('button');btn.className='copy-btn';btn.textContent='复制';
      btn.onclick=()=>{navigator.clipboard.writeText(raw);btn.textContent='✓ 已复制';btn.classList.add('copied');setTimeout(()=>{btn.textContent='复制';btn.classList.remove('copied')},1500)};
      hd.appendChild(lang);hd.appendChild(btn);pre.insertBefore(hd,code);
    });
    loadAssetImages(main);
    main.querySelectorAll('.unit-link').forEach(a=>{a.onclick=(e)=>{e.preventDefault();loadUnit(a.dataset.unit)}});
  }catch(e){main.innerHTML='<div class="loader">加载失败: '+esc(e.message)+'</div>'}
}

async function loadAssetImages(container){
  const imgs=container.querySelectorAll('img[data-asset]');
  for(const img of imgs){
    const url=img.dataset.src;if(!url)continue;
    try{
      if(!imgCache[url]){imgCache[url]=fetchDecBytes(url).then(bytes=>{
        const ext=(img.dataset.asset||'').split('.').pop().toLowerCase();
        const mime={'png':'image/png','jpg':'image/jpeg','jpeg':'image/jpeg','gif':'image/gif','webp':'image/webp','bmp':'image/bmp','svg':'image/svg+xml'}[ext]||'image/png';
        return URL.createObjectURL(new Blob([bytes],{type:mime}));
      })}
      img.src=await imgCache[url];
      img.onclick=()=>openLightbox(img.src);
    }catch(e){img.alt='解密失败';img.style.padding='24px';img.style.color='var(--err)'}
  }
}

function openLightbox(src){const lb=$('lightbox');lb.querySelector('img').src=src;lb.classList.add('show')}
$('lightbox').onclick=()=>$('lightbox').classList.remove('show');

// 返回顶部
$('main').addEventListener('scroll',()=>{
  $('toTop').classList.toggle('show',$('main').scrollTop>400);
});
$('toTop').onclick=()=>$('main').scrollTo({top:0,behavior:'smooth'});

$('unlockBtn').onclick=unlock;
$('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});
$('search').addEventListener('input',e=>renderList(e.target.value));
$('lockBtn').onclick=()=>location.reload();
</script>
</body>
</html>
